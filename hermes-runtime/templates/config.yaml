mcp_servers:
  paperclip:
    command: "node"
    args: ["/opt/paperclip/mcp-paperclip/server.mjs"]
    # Hermes filters env when spawning MCP subprocesses — only keys listed here
    # get forwarded. Without this block the paperclip MCP starts with no API key
    # and a default base URL of 127.0.0.1:3100 (where there is no Paperclip from
    # the Hermes container), so tool calls fail with "fetch failed" and
    # "companyId is required". ${VAR} placeholders resolve from the container env
    # at spawn time. See: tools/mcp_tool.py::_interpolate_env_vars in hermes-agent.
    env:
      PAPERCLIP_API_KEY: "${PAPERCLIP_API_KEY}"
      PAPERCLIP_API_BASE: "${PAPERCLIP_API_BASE}"
      PAPERCLIP_DEFAULT_COMPANY_ID: "${PAPERCLIP_DEFAULT_COMPANY_ID}"
      PAPERCLIP_PROFILE_SYNC_API_KEY: "${PAPERCLIP_PROFILE_SYNC_API_KEY}"
    enabled: true
    timeout: 60
    connect_timeout: 30
    allow_sampling: false
    tools:
      resources: false
      prompts: false

# Default toolset for messaging gateway profiles (Telegram, WhatsApp, etc.).
# hermes-telegram = hermes-cli in capabilities — full built-in toolkit.
# Brand seeds that add MCP toolsets (mcp-<name>) append to this list;
# bootstrap-profiles.sh merges missing items additively so no built-in
# tool is accidentally stripped.
toolsets:
  - hermes-telegram

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2000
  user_char_limit: 2000
  provider: holographic

# Holographic: local SQLite memory store. No API key, no external service.
# auto_extract: true — automatically extracts facts from conversations at session end.
# Per-profile isolated (each profile gets its own memory_store.db).
plugins:
  hermes-memory-store:
    auto_extract: true
    default_trust: 0.5

# Context engine: use compressor to auto-summarise old messages when context fills.
# Fires at 50% of context window; retains last 20 messages verbatim; targets 20%
# of original size after compression. hygiene_hard_message_limit is a safety cap.
context:
  engine: compressor

compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20
  hygiene_hard_message_limit: 400

# ── Cost optimisation ─────────────────────────────────────────────────────────
# Route compression to a cheaper/faster model to cut costs. Compression fires
# on every long session — routing it off the primary saves ~90% on compression
# costs. Set to your cheapest fast model and uncomment.
# auxiliary:
#   compression:
#     provider: anthropic          # or openrouter / openai / google
#     model: claude-haiku-4-5-20251001  # cheapest Claude; swap as needed
#   summarization:
#     provider: anthropic
#     model: claude-haiku-4-5-20251001

# Prompt caching reduces cost on repeated context (system prompt, skill blocks).
# Hermes attaches cache_control breakpoints automatically when this is enabled.
prompt_caching:
  enabled: true

# ── No-agent cron watchdogs ───────────────────────────────────────────────────
# Run deterministic shell checks on a schedule with zero LLM tokens.
# Uncomment and adjust thresholds to enable disk-space alerting.
# cron:
#   - name: disk-watchdog
#     schedule: "*/15 * * * *"
#     mode: no_agent
#     command: "df -h /data | awk 'NR==2 && $5+0 > 85 {print \"Disk usage high: \"$5}'"
#     notify: telegram_private

# Security defaults. redact_secrets strips API key patterns from memory writes
# and tool output before they reach the LLM or are stored in MEMORY.md.
# tirith_enabled activates the Tirith approval layer for destructive actions.
security:
  allow_private_urls: false
  redact_secrets: true
  secrets:
    redact_in_memory_writes: true
    redact_in_traces: true
  tirith_enabled: true
  approval:
    denylist:
      - 'rm\s+-rf\s+/'
      - 'curl\s+.+\|\s*(sh|bash)'
      - '169\.254\.169\.254'
      - 'cat\s+~?/?\.?ssh/'
      - 'aws\s+s3\s+sync\s+.+\s+s3://'
      # Require approval before merging PRs or pushing directly to main.
      # GitHub branch protection covers public repos; these catch the gap for
      # private repos where branch protection requires a paid plan.
      - 'gh\s+pr\s+merge'
      - 'git\s+push\s+.*\s+main'
      - 'git\s+push\s+origin\s+main'
      - 'git\s+checkout\s+main'

# STT defaults. `small` is the minimum quality threshold for accurate
# transcription of voice notes containing names, numbers, and domain terms.
# `base` (the Hermes upstream default) frequently mis-transcribes these.
# Profiles that need faster-but-rougher transcription can override locally.
stt:
  provider: "local"
  local:
    model: "small"
