# pipeline-config.yml — Pipeline Core deployment config
# Copy to .github/pipeline-config.yml in your repo and edit.
# Schema: ../scripts/schemas/pipeline-config.schema.json
#   (validated by the pipeline-validate-config workflow).

# Schema version. Do not change — must be 1.
schema_version: 1

# Deployment identity. Both fields are required.
deployment:
  installation_id: paperclip-hermes-gbrain        # Lowercase slug, 2-64 chars, e.g. acme-api
  cron_timezone: Australia/Sydney    # IANA timezone for scheduled workflows

# Domains. At least one required.
# A "domain" is a top-level area of work in your repo. Used for the domain:* label
# namespace and as a routing dimension in path_mappings below.
# "name" must be lowercase, 2-32 chars, letters/digits/hyphens only.
domains:
  - name: frontend
    description: User-facing UI (web, mobile)

  - name: backend
    description: Server-side services, APIs

  - name: infra
    description: Infrastructure, CI/CD, deployment

# Components. At least one required.
# A "component" is a finer-grained module within (one or more) domains. Used for the
# component:* label namespace.
# "name" must be lowercase, 2-32 chars, letters/digits/hyphens only.
components:
  - name: auth
    description: Authentication / session handling

  - name: payments
    description: Payment processing

  - name: search

# Path mappings. Used by actions/labeler@v5 (via generate-labeler.mjs) to apply
# domain:* and component:* labels based on changed file paths.
# Labels must reference a "name" declared in domains or components above.
path_mappings:
  - paths: ['src/web/**', 'src/mobile/**']
    labels: ['domain:frontend']
  - paths: ['src/api/**', 'src/services/**']
    labels: ['domain:backend']
  - paths: ['infra/**', '.github/**', 'Dockerfile*']
    labels: ['domain:infra']
  - paths: ['src/**/auth/**']
    labels: ['component:auth']
  - paths: ['src/**/payments/**']
    labels: ['component:payments']
  - paths: ['src/**/search/**']
    labels: ['component:search']

# Reviewer policy. Used by pipeline-merge-gate to enforce minimum approvals.
# default_required_reviewers applies repo-wide; by_component overrides per component name.
reviewer_policy:
  default_required_reviewers: 1
  by_component:
    infra: 2      # e.g. require 2 reviewers for infra-labelled PRs
    auth: 2

# Delivery settings. Optional.
# delivery:
#   drift_scan_schedule: "0 8 * * 1"   # cron string (UTC); default: weekly Monday 08:00
#   drift_report:
#     type: github_comment
#     target_issue: 42                  # Issue number to post drift reports on
