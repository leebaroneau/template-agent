# .github/workflows/pipeline-pr-labels.yml
name: Pipeline — pr-labels

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  pr-labels:
    uses: leebaroneau/pipeline-core/.github/workflows/pr-labels.yml@v1
    permissions:
      contents: read
      pull-requests: write
    with:
      labeler-config: .github/labeler.yml
