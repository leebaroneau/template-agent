name: Build & push agent stack image

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Build paperclip-base image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: 'Pass force=true to the Coolify deploy webhooks (overrides skip-if-no-change check).'
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: build-agent-stack-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Skip the push trigger if either base Dockerfile changed in this commit —
  # the cascade from build-hermes-base → build-paperclip-base → this workflow
  # will rebuild in the correct order via workflow_run events.
  preflight:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif git diff --name-only HEAD^ HEAD | grep -qE 'paperclip/Dockerfile\.(hermes-base|paperclip-base)'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: preflight
    runs-on: ubuntu-latest
    if: |
      needs.preflight.outputs.skip != 'true' &&
      (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success')
    env:
      REMOTE_IMAGE: ghcr.io/leebaroneau/template-agent
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve commit SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push template-agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: paperclip/Dockerfile
          push: true
          tags: |
            ${{ env.REMOTE_IMAGE }}:sha-${{ steps.sha.outputs.sha }}
            ${{ env.REMOTE_IMAGE }}:latest
          cache-from: |
            type=registry,ref=ghcr.io/leebaroneau/template-agent:buildcache
            type=registry,ref=ghcr.io/leebaroneau/paperclip-base:buildcache
            type=gha
          cache-to: |
            type=registry,ref=ghcr.io/leebaroneau/template-agent:buildcache,mode=max
            type=gha,mode=max,ignore-error=true

      - name: Audit blank image
        run: |
          docker pull "$REMOTE_IMAGE:sha-${{ steps.sha.outputs.sha }}"
          ./scripts/audit-blank-image.sh "$REMOTE_IMAGE:sha-${{ steps.sha.outputs.sha }}"

      - name: Trigger ALX Coolify deploy
        if: success() && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_run') && vars.COOLIFY_ALX_BASE_URL != '' && vars.COOLIFY_ALX_APP_UUID != ''
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_ALX_TOKEN }}" \
            "${{ vars.COOLIFY_ALX_BASE_URL }}/api/v1/deploy?uuid=${{ vars.COOLIFY_ALX_APP_UUID }}&force=${{ inputs.force || 'false' }}" \
            || echo "ALX deploy trigger failed (non-fatal)"

      - name: Trigger Haverford Coolify deploy
        if: success() && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_run') && vars.COOLIFY_HAVERFORD_BASE_URL != '' && vars.COOLIFY_HAVERFORD_APP_UUID != ''
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_HAVERFORD_TOKEN }}" \
            "${{ vars.COOLIFY_HAVERFORD_BASE_URL }}/api/v1/deploy?uuid=${{ vars.COOLIFY_HAVERFORD_APP_UUID }}&force=${{ inputs.force || 'false' }}" \
            || echo "Haverford deploy trigger failed (non-fatal)"

      - name: Trigger Genvest Coolify deploy
        if: success() && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_run') && vars.COOLIFY_GENVEST_BASE_URL != '' && vars.COOLIFY_GENVEST_APP_UUID != ''
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_GENVEST_TOKEN }}" \
            "${{ vars.COOLIFY_GENVEST_BASE_URL }}/api/v1/deploy?uuid=${{ vars.COOLIFY_GENVEST_APP_UUID }}&force=${{ inputs.force || 'false' }}" \
            || echo "Genvest deploy trigger failed (non-fatal)"
