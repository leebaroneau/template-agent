name: Build & push agent stack image

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: 'Pass force=true to the Coolify deploy webhooks (overrides skip-if-no-change check).'
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: build-agent-stack-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REMOTE_IMAGE: ghcr.io/leebaroneau/template-agent
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push template-agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: paperclip/Dockerfile
          push: true
          tags: |
            ${{ env.REMOTE_IMAGE }}:sha-${{ github.sha }}
            ${{ env.REMOTE_IMAGE }}:latest
          cache-from: |
            type=registry,ref=ghcr.io/leebaroneau/paperclip-base:latest
            type=gha
          cache-to: type=gha,mode=max

      - name: Audit blank image
        run: |
          docker pull "$REMOTE_IMAGE:sha-${GITHUB_SHA}"
          ./scripts/audit-blank-image.sh "$REMOTE_IMAGE:sha-${GITHUB_SHA}"

      - name: Trigger ALX Coolify deploy
        if: success() && github.ref == 'refs/heads/main' && vars.COOLIFY_ALX_BASE_URL != '' && vars.COOLIFY_ALX_APP_UUID != ''
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_ALX_TOKEN }}" \
            "${{ vars.COOLIFY_ALX_BASE_URL }}/api/v1/deploy?uuid=${{ vars.COOLIFY_ALX_APP_UUID }}&force=${{ inputs.force || 'false' }}" \
            || echo "ALX deploy trigger failed (non-fatal)"

      - name: Trigger Haverford Coolify deploy
        if: success() && github.ref == 'refs/heads/main' && vars.COOLIFY_HAVERFORD_BASE_URL != '' && vars.COOLIFY_HAVERFORD_APP_UUID != ''
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_HAVERFORD_TOKEN }}" \
            "${{ vars.COOLIFY_HAVERFORD_BASE_URL }}/api/v1/deploy?uuid=${{ vars.COOLIFY_HAVERFORD_APP_UUID }}&force=${{ inputs.force || 'false' }}" \
            || echo "Haverford deploy trigger failed (non-fatal)"

      - name: Trigger Genvest Coolify deploy
        if: success() && github.ref == 'refs/heads/main' && vars.COOLIFY_GENVEST_BASE_URL != '' && vars.COOLIFY_GENVEST_APP_UUID != ''
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_GENVEST_TOKEN }}" \
            "${{ vars.COOLIFY_GENVEST_BASE_URL }}/api/v1/deploy?uuid=${{ vars.COOLIFY_GENVEST_APP_UUID }}&force=${{ inputs.force || 'false' }}" \
            || echo "Genvest deploy trigger failed (non-fatal)"
