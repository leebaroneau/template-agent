name: Build & push agent stack image

on:
  push:
    branches: [main]
    paths:
      - paperclip/Dockerfile
      - paperclip/**
      - hermes-runtime/**
      - compose.yaml
      - .github/workflows/build-image.yml
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - paperclip/Dockerfile
      - paperclip/**
      - hermes-runtime/**
      - compose.yaml
      - .github/workflows/build-image.yml
  workflow_dispatch:
    inputs:
      force:
        description: 'Pass force=true to the Coolify deploy webhooks (overrides Coolify''s skip-if-no-change check). Use this to recover from a build/pull race where Coolify deployed an older :latest digest than what GHCR now has.'
        type: boolean
        default: false

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: leebaroneau/template-agent

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space on runner
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - uses: actions/checkout@v6

      - id: paperclip_version
        run: |
          version=$(grep -E '^ARG PAPERCLIP_VERSION=' paperclip/Dockerfile | head -1 | cut -d= -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Select image platforms
        run: |
          echo "IMAGE_PLATFORMS=linux/amd64,linux/arm64" >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
            type=raw,value=paperclip-${{ steps.paperclip_version.outputs.version }},enable=${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}
            type=raw,value=sha-${{ github.sha }},enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=pr-${{ github.event.pull_request.number }},enable=${{ github.event_name == 'pull_request' }}
            type=raw,value=sha-${{ github.event.pull_request.head.sha }},enable=${{ github.event_name == 'pull_request' }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: paperclip/Dockerfile
          platforms: ${{ env.IMAGE_PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min,ignore-error=true
          provenance: false

      - name: Trigger ALX Coolify deploy
        if: success() && github.event_name != 'pull_request' && vars.COOLIFY_ALX_BASE_URL != '' && vars.COOLIFY_ALX_APP_UUID != ''
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_ALX_TOKEN }}" \
            "${{ vars.COOLIFY_ALX_BASE_URL }}/api/v1/deploy?uuid=${{ vars.COOLIFY_ALX_APP_UUID }}&force=${{ inputs.force || 'false' }}" \
            || echo "ALX deploy trigger failed (non-fatal)"

      - name: Trigger leebarone Coolify deploy
        if: success() && github.event_name != 'pull_request' && vars.COOLIFY_LEEBARONE_BASE_URL != '' && vars.COOLIFY_LEEBARONE_APP_UUID != ''
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_LEEBARONE_TOKEN }}" \
            "${{ vars.COOLIFY_LEEBARONE_BASE_URL }}/api/v1/deploy?uuid=${{ vars.COOLIFY_LEEBARONE_APP_UUID }}&force=${{ inputs.force || 'false' }}" \
            || echo "leebarone deploy trigger failed (non-fatal)"

      - name: Trigger Genvest Coolify deploy
        if: success() && github.event_name != 'pull_request' && vars.COOLIFY_GENVEST_BASE_URL != '' && vars.COOLIFY_GENVEST_APP_UUID != ''
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_GENVEST_TOKEN }}" \
            "${{ vars.COOLIFY_GENVEST_BASE_URL }}/api/v1/deploy?uuid=${{ vars.COOLIFY_GENVEST_APP_UUID }}&force=${{ inputs.force || 'false' }}" \
            || echo "Genvest deploy trigger failed (non-fatal)"
