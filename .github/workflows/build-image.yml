name: Build & push agent stack image

on:
  push:
    branches: [main]
    paths:
      - paperclip/Dockerfile
      - paperclip/**
      - hermes-runtime/**
      - compose.yaml
      - .github/workflows/build-image.yml
  workflow_dispatch:
    inputs:
      force:
        description: 'Pass force=true to the Coolify deploy webhooks (overrides Coolify''s skip-if-no-change check). Use this to recover from a build/pull race where Coolify deployed an older :latest digest than what GHCR now has.'
        type: boolean
        default: false

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space on runner
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: false

      - uses: actions/checkout@v4

      - id: paperclip_version
        run: |
          version=$(grep -E '^ARG PAPERCLIP_VERSION=' paperclip/Dockerfile | head -1 | cut -d= -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=raw,value=paperclip-${{ steps.paperclip_version.outputs.version }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: paperclip/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Trigger ALX Coolify deploy
        if: success() && vars.COOLIFY_ALX_BASE_URL != '' && vars.COOLIFY_ALX_APP_UUID != ''
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_ALX_TOKEN }}" \
            "${{ vars.COOLIFY_ALX_BASE_URL }}/api/v1/deploy?uuid=${{ vars.COOLIFY_ALX_APP_UUID }}&force=${{ inputs.force || 'false' }}" \
            || echo "ALX deploy trigger failed (non-fatal)"

      - name: Trigger leebarone Coolify deploy
        if: success() && vars.COOLIFY_LEEBARONE_BASE_URL != '' && vars.COOLIFY_LEEBARONE_APP_UUID != ''
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_LEEBARONE_TOKEN }}" \
            "${{ vars.COOLIFY_LEEBARONE_BASE_URL }}/api/v1/deploy?uuid=${{ vars.COOLIFY_LEEBARONE_APP_UUID }}&force=${{ inputs.force || 'false' }}" \
            || echo "leebarone deploy trigger failed (non-fatal)"

      - name: Trigger Genvest Coolify deploy
        if: success() && vars.COOLIFY_GENVEST_BASE_URL != '' && vars.COOLIFY_GENVEST_APP_UUID != ''
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_GENVEST_TOKEN }}" \
            "${{ vars.COOLIFY_GENVEST_BASE_URL }}/api/v1/deploy?uuid=${{ vars.COOLIFY_GENVEST_APP_UUID }}&force=${{ inputs.force || 'false' }}" \
            || echo "Genvest deploy trigger failed (non-fatal)"
