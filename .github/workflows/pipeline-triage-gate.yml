# .github/workflows/pipeline-triage-gate.yml
name: Pipeline — triage-gate

on:
  issues:
    types: [opened, labeled, unlabeled]

jobs:
  triage-gate:
    uses: leebaroneau/pipeline-core/.github/workflows/triage-gate.yml@v1
    permissions:
      contents: read
      issues: write
    with:
      runner: '["ubuntu-latest"]'
      config-path: .github/pipeline-config.yml
