name: Build hermes-base image

on:
  push:
    branches: [main]
    paths:
      - paperclip/Dockerfile.hermes-base
  workflow_dispatch:
    inputs:
      hermes_agent_ref:
        description: 'Hermes version tag (e.g. v2026.6.5). Defaults to value in Dockerfile.'
        type: string
        default: ''

permissions:
  contents: read
  packages: write

concurrency:
  group: build-hermes-base-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract HERMES_AGENT_REF from Dockerfile
        id: ref
        run: |
          REF="${{ inputs.hermes_agent_ref }}"
          if [ -z "$REF" ]; then
            REF=$(grep '^ARG HERMES_AGENT_REF=' paperclip/Dockerfile.hermes-base | cut -d= -f2)
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Build and push hermes-base
        uses: docker/build-push-action@v5
        with:
          context: .
          file: paperclip/Dockerfile.hermes-base
          push: true
          build-args: |
            HERMES_AGENT_REF=${{ steps.ref.outputs.ref }}
          tags: |
            ghcr.io/leebaroneau/hermes-base:${{ steps.ref.outputs.ref }}
            ghcr.io/leebaroneau/hermes-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
