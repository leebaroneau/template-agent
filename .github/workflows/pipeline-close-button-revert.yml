# .github/workflows/pipeline-close-button-revert.yml
name: Pipeline — close-button-revert

on:
  issues:
    types: [closed]

jobs:
  close-button-revert:
    uses: leebaroneau/pipeline-core/.github/workflows/close-button-revert.yml@v1
    permissions:
      contents: read
      issues: write
      pull-requests: read
    with:
      runner: '["ubuntu-latest"]'
      config-path: .github/pipeline-config.yml
