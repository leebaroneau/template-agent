name: Build paperclip-base image

on:
  push:
    branches: [main]
    paths:
      - paperclip/Dockerfile.paperclip-base
  workflow_run:
    workflows: ["Build hermes-base image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-paperclip-base-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve commit SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push paperclip-base
        uses: docker/build-push-action@v5
        with:
          context: .
          file: paperclip/Dockerfile.paperclip-base
          push: true
          tags: |
            ghcr.io/leebaroneau/paperclip-base:sha-${{ steps.sha.outputs.sha }}
            ghcr.io/leebaroneau/paperclip-base:latest
          cache-from: |
            type=registry,ref=ghcr.io/leebaroneau/paperclip-base:buildcache
            type=registry,ref=ghcr.io/leebaroneau/hermes-base:buildcache
            type=gha
          cache-to: |
            type=registry,ref=ghcr.io/leebaroneau/paperclip-base:buildcache,mode=max
            type=gha,mode=max
