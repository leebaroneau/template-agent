# .github/workflows/pipeline-merge-gate.yml
name: Pipeline — merge-gate

on:
  pull_request:
    types: [opened, synchronize, edited]
  pull_request_review:
    types: [submitted, dismissed]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  merge-gate:
    uses: leebaroneau/pipeline-core/.github/workflows/merge-gate.yml@v1
    permissions:
      contents: read
      statuses: write
      pull-requests: write
      issues: read
      checks: read
    with:
      config-path: .github/pipeline-config.yml
