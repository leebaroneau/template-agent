services:
  paperclip:
    image: ${TEMPLATE_AGENT_IMAGE:-ghcr.io/leebaroneau/template-agent:latest}
    pull_policy: always
    environment:
      PAPERCLIP_HOME: /data
      PAPERCLIP_TELEMETRY_DISABLED: ${PAPERCLIP_TELEMETRY_DISABLED:-1}
      PAPERCLIP_BIND: lan
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: private
      PAPERCLIP_PUBLIC_URL: ${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}
      PAPERCLIP_AUTH_PUBLIC_BASE_URL: ${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}
      PAPERCLIP_ALLOWED_HOSTNAMES: ${PAPERCLIP_ALLOWED_HOSTNAMES:-paperclip,localhost,127.0.0.1}
      BETTER_AUTH_URL: ${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}
      BETTER_AUTH_BASE_URL: ${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}
      PORT: "3100"
      HERMES_DATA_ROOT: /data/hermes
      GBRAIN_DATA_ROOT: /data/gbrain
      HERMES_HOME: /data/hermes
      GBRAIN_HOME: /data/gbrain/default
      HERMES_PROFILES: ${HERMES_PROFILES:-default}
      PAPERCLIP_API_URL: http://127.0.0.1:3100
      PROFILE_SYNC_ENABLED: ${PROFILE_SYNC_ENABLED:-0}
      PROFILE_SYNC_INTERVAL_SEC: ${PROFILE_SYNC_INTERVAL_SEC:-60}
      PROFILE_SYNC_DELETE_MODE: ${PROFILE_SYNC_DELETE_MODE:-archive}
      PROFILE_SYNC_MANIFEST_PATH: /data/agent-stack/profile-sync/manifest.json
      PROFILE_SYNC_TEMPLATE_DIR: /opt/hermes-runtime/templates
      PROFILE_SYNC_DEFAULT_COMPANY_SKILLS: ${PROFILE_SYNC_DEFAULT_COMPANY_SKILLS:-gbrain,use-100m-framework}
      PROFILE_SYNC_DEFAULT_COMPANY_SKILL_SOURCE_DIR: ${PROFILE_SYNC_DEFAULT_COMPANY_SKILL_SOURCE_DIR:-/opt/hermes-runtime/skills}
      ORG_MIRROR_ROOT: ${ORG_MIRROR_ROOT:-/data/agent-stack}
      PROFILE_SYNC_API_BASE: ${PROFILE_SYNC_API_BASE:-http://127.0.0.1:3100}
      PAPERCLIP_AGENT_API_URL: ${PAPERCLIP_AGENT_API_URL:-http://127.0.0.1:3100}
      PAPERCLIP_PROFILE_SYNC_API_KEY: ${PAPERCLIP_PROFILE_SYNC_API_KEY:-}
      PAPERCLIP_COMPANY_IDS: ${PAPERCLIP_COMPANY_IDS:-}
      PAPERCLIP_COMPANIES: ${PAPERCLIP_COMPANIES:-}
      PAPERCLIP_API_KEY: ${PAPERCLIP_API_KEY:-}
      PAPERCLIP_API_BASE: http://127.0.0.1:3100
      PAPERCLIP_DEFAULT_COMPANY_ID: ${PAPERCLIP_DEFAULT_COMPANY_ID:-}
    expose:
      - "3100"
    volumes:
      - paperclip-data:/data
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.gzip.compress=true
      - traefik.http.routers.paperclip.entryPoints=http
      - traefik.http.routers.paperclip.middlewares=gzip
      - traefik.http.routers.paperclip.rule=Host(`${PAPERCLIP_HOSTNAME:-paperclip.example.com}`)
      - traefik.http.routers.paperclip.service=paperclip
      - traefik.http.services.paperclip.loadbalancer.server.port=3100
    restart: unless-stopped

  hermes:
    image: ${TEMPLATE_AGENT_IMAGE:-ghcr.io/leebaroneau/template-agent:latest}
    pull_policy: always
    entrypoint: ["/usr/bin/tini", "--", "/opt/paperclip/hermes-entrypoint.sh"]
    environment:
      HERMES_DATA_ROOT: /data/hermes
      GBRAIN_DATA_ROOT: /data/gbrain
      HERMES_HOME: /data/hermes
      GBRAIN_HOME: /data/gbrain/default
      HERMES_PROFILES: ${HERMES_PROFILES:-default}
      HERMES_DASHBOARD_ENABLED: ${HERMES_DASHBOARD_ENABLED:-0}
      HERMES_DASHBOARD_HOST: 0.0.0.0
      HERMES_DASHBOARD_PORT: "9119"
      HERMES_DASHBOARD_TUI: ${HERMES_DASHBOARD_TUI:-1}
      HERMES_DASHBOARD_SKIP_BUILD: ${HERMES_DASHBOARD_SKIP_BUILD:-1}
      HERMES_GATEWAY_AUTOSTART: ${HERMES_GATEWAY_AUTOSTART:-1}
      HERMES_GATEWAY_PROFILES: ${HERMES_GATEWAY_PROFILES:-auto}
      PAPERCLIP_API_KEY: ${PAPERCLIP_API_KEY:-}
      PAPERCLIP_API_BASE: http://paperclip:3100
      PAPERCLIP_DEFAULT_COMPANY_ID: ${PAPERCLIP_DEFAULT_COMPANY_ID:-}
      PAPERCLIP_PROFILE_SYNC_API_KEY: ${PAPERCLIP_PROFILE_SYNC_API_KEY:-}
    expose:
      - "9119"
    volumes:
      - paperclip-data:/data
    depends_on:
      - paperclip
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/hermes-entrypoint-ready"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

volumes:
  paperclip-data:
