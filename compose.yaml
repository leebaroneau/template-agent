services:
  paperclip:
    image: ${TEMPLATE_AGENT_IMAGE:-ghcr.io/leebaroneau/template-agent:latest}
    pull_policy: always
    environment:
      PAPERCLIP_HOME: /data
      PAPERCLIP_TELEMETRY_DISABLED: ${PAPERCLIP_TELEMETRY_DISABLED:-1}
      PAPERCLIP_BIND: lan
      PAPERCLIP_DEPLOYMENT_MODE: authenticated
      PAPERCLIP_DEPLOYMENT_EXPOSURE: private
      PAPERCLIP_PUBLIC_URL: ${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}
      PAPERCLIP_AUTH_PUBLIC_BASE_URL: ${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}
      # NOTE: PAPERCLIP_ALLOWED_HOSTNAMES is intentionally NOT set here.
      # Coolify injects app env vars into the container at runtime, but an
      # explicit `environment:` value with a non-empty substitution default
      # OVERRIDES that injection. Neither ${PAPERCLIP_HOSTNAME} nor the
      # Coolify-injected per-deployment FQDN var is available for compose-parse
      # substitution (Coolify only injects its runtime vars into the container,
      # not into the render .env), so any hardcoded value here resolves to its
      # literal default and silently leaves the real public host un-allowlisted.
      # Set PAPERCLIP_ALLOWED_HOSTNAMES as a normal Coolify app env var
      # (e.g. "paperclip.example.com,paperclip,localhost,127.0.0.1"); it then
      # reaches the container via runtime injection. Local dev sets it in .env
      # (see .env.example) or relies on Paperclip's built-in localhost default.
      BETTER_AUTH_URL: ${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}
      BETTER_AUTH_BASE_URL: ${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}
      PORT: "3100"
      HERMES_DATA_ROOT: /data/hermes
      HERMES_HOME: /data/hermes
      HERMES_PROFILES: ${HERMES_PROFILES:-default}
      PAPERCLIP_API_URL: http://127.0.0.1:3100
      # PROFILE_SYNC_ENABLED: not set — profile-sync starts automatically when
      # PAPERCLIP_PROFILE_SYNC_API_KEY is present. Set PROFILE_SYNC_ENABLED=0 to disable.
      PROFILE_SYNC_INTERVAL_SEC: ${PROFILE_SYNC_INTERVAL_SEC:-60}
      PROFILE_SYNC_DELETE_MODE: ${PROFILE_SYNC_DELETE_MODE:-archive}
      PROFILE_SYNC_MANIFEST_PATH: /data/agent-stack/profile-sync/manifest.json
      PROFILE_SYNC_TEMPLATE_DIR: /opt/hermes-runtime/templates
      TOOL_ACCESS_SEED_ENABLED: ${TOOL_ACCESS_SEED_ENABLED:-1}
      TOOL_ACCESS_APPLY_DEFAULT_PRESET: ${TOOL_ACCESS_APPLY_DEFAULT_PRESET:-1}
      TOOL_ACCESS_DEFAULT_PRESET: ${TOOL_ACCESS_DEFAULT_PRESET:-agent-stack-hermes-default}
      PROFILE_SYNC_DEFAULT_COMPANY_SKILLS: ${PROFILE_SYNC_DEFAULT_COMPANY_SKILLS:-use-100m-framework}
      PROFILE_SYNC_DEFAULT_COMPANY_SKILL_SOURCE_DIR: ${PROFILE_SYNC_DEFAULT_COMPANY_SKILL_SOURCE_DIR:-/opt/hermes-runtime/skills}
      ORG_MIRROR_ROOT: ${ORG_MIRROR_ROOT:-/data/agent-stack}
      PROFILE_SYNC_API_BASE: ${PROFILE_SYNC_API_BASE:-http://127.0.0.1:3100}
      PAPERCLIP_AGENT_API_URL: ${PAPERCLIP_AGENT_API_URL:-http://127.0.0.1:3100}
      PAPERCLIP_PROFILE_SYNC_API_KEY: ${PAPERCLIP_PROFILE_SYNC_API_KEY:-}
      PAPERCLIP_COMPANY_IDS: ${PAPERCLIP_COMPANY_IDS:-}
      PAPERCLIP_COMPANIES: ${PAPERCLIP_COMPANIES:-}
      PAPERCLIP_API_KEY: ${PAPERCLIP_API_KEY:-}
      PAPERCLIP_API_BASE: http://127.0.0.1:3100
      PAPERCLIP_DEFAULT_COMPANY_ID: ${PAPERCLIP_DEFAULT_COMPANY_ID:-}
    expose:
      - "3100"
    volumes:
      - paperclip-data:/data
    restart: unless-stopped

  hermes:
    image: ${TEMPLATE_AGENT_IMAGE:-ghcr.io/leebaroneau/template-agent:latest}
    pull_policy: always
    entrypoint: ["/usr/bin/tini", "--", "/opt/paperclip/hermes-entrypoint.sh"]
    environment:
      HERMES_DATA_ROOT: /data/hermes
      HERMES_HOME: /data/hermes
      HERMES_PROFILES: ${HERMES_PROFILES:-default}
      HERMES_DASHBOARD_ENABLED: ${HERMES_DASHBOARD_ENABLED:-0}
      HERMES_DASHBOARD_HOST: 0.0.0.0
      HERMES_DASHBOARD_PORT: "9119"
      HERMES_DASHBOARD_TUI: ${HERMES_DASHBOARD_TUI:-1}
      HERMES_DASHBOARD_SKIP_BUILD: ${HERMES_DASHBOARD_SKIP_BUILD:-1}
      HERMES_GATEWAY_AUTOSTART: ${HERMES_GATEWAY_AUTOSTART:-1}
      HERMES_GATEWAY_PROFILES: ${HERMES_GATEWAY_PROFILES:-auto}
      # Redirect XDG config + data dirs into the persistent volume so all CLI OAuth
      # tokens (gh, shopify, etc.) survive container redeploys. Non-XDG tools get
      # explicit vars below. GH_CONFIG_DIR is redundant when XDG_CONFIG_HOME is set
      # but kept explicit for clarity.
      XDG_CONFIG_HOME: /data/hermes/.config
      XDG_DATA_HOME: /data/hermes/.local/share
      GH_CONFIG_DIR: /data/hermes/.config/gh
      DOCKER_CONFIG: /data/hermes/.docker
      AWS_CONFIG_FILE: /data/hermes/.aws/config
      AWS_SHARED_CREDENTIALS_FILE: /data/hermes/.aws/credentials
      PAPERCLIP_API_KEY: ${PAPERCLIP_API_KEY:-}
      # Default to Docker Compose internal service DNS. Operators running in a
      # different topology (e.g. Paperclip on a separate host) can override via env.
      PAPERCLIP_API_BASE: ${PAPERCLIP_API_BASE:-http://paperclip:3100}
      PAPERCLIP_DEFAULT_COMPANY_ID: ${PAPERCLIP_DEFAULT_COMPANY_ID:-}
      PAPERCLIP_PROFILE_SYNC_API_KEY: ${PAPERCLIP_PROFILE_SYNC_API_KEY:-}
    expose:
      - "9119"
    volumes:
      - paperclip-data:/data
    depends_on:
      - paperclip
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/hermes-entrypoint-ready"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

volumes:
  paperclip-data:
